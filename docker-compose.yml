services:
  varlocker:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - MASTER_PASSWORD=${MASTER_PASSWORD}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
